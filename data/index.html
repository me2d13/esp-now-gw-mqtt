<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP-NOW Gateway</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <a href="https://github.com/me2d13/esp-now-gw-mqtt" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                Gateway
            </a>
            <a href="https://github.com/me2d13/esp-now-gw-transmitter" target="_blank">Transmitter</a>
            <a href="https://github.com/me2d13/esp-now-relay" target="_blank">Relay</a>
            <a href="https://github.com/me2d13/esp-now-relay-remote" target="_blank">Remote</a>
        </nav>

        <header>
            <div>
                <h1>ESP-NOW MQTT Gateway</h1>
                <p id="device-info" style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">
                    Connecting...
                </p>
            </div>
            <div class="controls">
                <div id="auto-refresh-status" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-secondary);">
                    <div class="pulse" style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></div>
                    Live
                </div>
            </div>
        </header>

        <main>
            <div class="card" style="margin-bottom: 2rem;">
                <div class="collapsible-header" id="about-header">
                    <h2 style="font-size: 1.25rem;">System Information</h2>
                    <svg class="chevron" id="about-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                <div id="about-content" class="collapsible-content">
                    <div id="about-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
                        <div style="color: var(--text-secondary);">Loading system data...</div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 2rem;">
                <h2 style="font-size: 1.25rem; margin-bottom: 1rem;">Send Command</h2>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <textarea id="tx-message" rows="4" style="width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-radius: 0.5rem; color: var(--text-primary); padding: 0.75rem; font-family: 'Fira Code', monospace; font-size: 0.875rem; resize: vertical;" placeholder='{"to":"MAC_ADDRESS", "message":{"channel":1, "push":500}}'></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div id="send-status" style="font-size: 0.875rem;"></div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="btn-clear" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color);">
                                Clear
                            </button>
                            <button id="btn-send" style="background: #818cf8;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                Send Message
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <div>
                        <h2 style="font-size: 1.25rem;">Captured Logs</h2>
                        <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.2rem;">All timestamps are in GMT</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div id="log-count" style="font-size: 0.875rem; color: var(--text-secondary);">0 entries</div>
                        <button id="btn-refresh" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                            Refresh
                        </button>
                    </div>
                </div>
                <div id="log-container" class="log-container">
                    <div style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">Loading logs...</div>
                </div>
            </div>
        </main>

        <footer style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--text-secondary);">
            ESP-NOW Gateway &copy; 2024
        </footer>
    </div>

    <script>
        const logContainer = document.getElementById('log-container');
        const btnRefresh = document.getElementById('btn-refresh');
        const logCountEl = document.getElementById('log-count');
        const deviceInfoEl = document.getElementById('device-info');
        const aboutContainer = document.getElementById('about-container');
        const aboutHeader = document.getElementById('about-header');
        const aboutContent = document.getElementById('about-content');
        const aboutChevron = document.getElementById('about-chevron');
        const btnSend = document.getElementById('btn-send');
        const btnClear = document.getElementById('btn-clear');
        const txMessage = document.getElementById('tx-message');
        const sendStatus = document.getElementById('send-status');

        aboutHeader.addEventListener('click', () => {
            aboutContent.classList.toggle('expanded');
            aboutChevron.classList.toggle('expanded');
        });

        btnClear.addEventListener('click', () => {
            txMessage.value = '';
            sendStatus.textContent = '';
        });

        btnSend.addEventListener('click', async () => {
            const body = txMessage.value.trim();
            if (!body) return;

            btnSend.disabled = true;
            sendStatus.textContent = 'Sending...';
            sendStatus.style.color = 'var(--text-secondary)';

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                });

                if (!response.ok) throw new Error('Failed to send');
                
                sendStatus.textContent = '✓ Message sent successfully';
                sendStatus.style.color = 'var(--success)';
                setTimeout(() => sendStatus.textContent = '', 3000);
            } catch (error) {
                sendStatus.textContent = '✗ Error: ' + error.message;
                sendStatus.style.color = 'var(--error)';
            } finally {
                btnSend.disabled = false;
            }
        });

        async function fetchAbout() {
            try {
                const response = await fetch('/api/about');
                if (!response.ok) throw new Error('Failed to fetch about info');
                const data = await response.json();
                renderAbout(data);
            } catch (error) {
                console.error('About Error:', error);
                aboutContainer.innerHTML = `<div style="color: var(--error);">Error loading system information</div>`;
            }
        }

        function renderAbout(data) {
            aboutContainer.innerHTML = data.map(item => `
                <div style="background: rgba(255,255,255,0.03); padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">
                        ${item.description}
                    </div>
                    <div style="font-weight: 600; font-family: 'Fira Code', monospace; font-size: 0.9rem; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis;">
                        ${item.value}
                    </div>
                </div>
            `).join('');
        }

        async function fetchInfo() {
            try {
                const response = await fetch('/api/info');
                if (!response.ok) throw new Error('Failed to fetch info');
                const info = await response.json();
                deviceInfoEl.textContent = `${info.name} v${info.version} | IP: ${info.ip}`;
            } catch (error) {
                console.error('Info Error:', error);
                deviceInfoEl.textContent = 'Gateway Offline';
                deviceInfoEl.style.color = 'var(--error)';
            }
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/log');
                if (!response.ok) throw new Error('Failed to fetch logs');
                const logs = await response.json();
                renderLogs(logs);
            } catch (error) {
                console.error('Error:', error);
                logContainer.innerHTML = `<div style="color: var(--error); text-align: center; margin-top: 2rem;">Error loading logs: ${error.message}</div>`;
            }
        }

        function renderLogs(logs) {
            if (logs.length === 0) {
                logContainer.innerHTML = '<div style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">No logs captured yet.</div>';
                logCountEl.textContent = '0 entries';
                return;
            }

            logCountEl.textContent = `${logs.length} entries`;
            
            // Sort by ID descending (newest first) or keep original? 
            // Usually logs are shown newest first in web UIs, or scrolled to bottom.
            // Let's do newest first for better visibility.
            const sortedLogs = [...logs].reverse();

            logContainer.innerHTML = sortedLogs.map(log => `
                <div class="log-entry">
                    <span class="log-id">#${log.id}</span>
                    <span class="log-time">${log.timestamp}</span>
                    <span class="log-job">[${log.job || 'SYSTEM'}]</span>
                    <span class="log-msg">${escapeHtml(log.message)}</span>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        btnRefresh.addEventListener('click', () => {
            btnRefresh.disabled = true;
            Promise.all([fetchLogs(), fetchInfo()]).finally(() => {
                btnRefresh.disabled = false;
            });
        });

        // Initial load
        fetchInfo();
        fetchAbout();
        fetchLogs();

        // Optional: Periodic refresh
        setInterval(fetchInfo, 30000); // Update info/uptime every 30s
    </script>
</body>
</html>
